name: SonarQube

on:
  push:
    branches:
      - main

jobs:
  sonar:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build & Sonar
        run: |
          ./gradlew clean test jacocoTestReport sonar \
          -Dsonar.token=${{ secrets.SONAR_TOKEN }}