apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: digital-payment

spec:
  replicas: 1

  selector:
    matchLabels:
      app: postgres

  template:
    metadata:
      labels:
        app: postgres

    spec:
      containers:
        - name: postgres
          image: postgres:17

          env:
            - name: POSTGRES_DB
              value: auth_k8s_db

            - name: POSTGRES_USER
              value: postgres

            - name: POSTGRES_PASSWORD
              value: postgres

          ports:
            - containerPort: 5432