apiVersion: 1

groups:
  - name: error-alerts
    interval: 1m

    rules:
      - uid: high-error-rate
        title: High Error Rate
        condition: A
        for: 2m

        data:
          - refId: A
            datasourceUid: prometheus
            model:
              expr: |
                sum(
                  rate(http_server_requests_seconds_count{status=~"5.."}[5m])
                ) > 5

        noDataState: NoData
        execErrState: Alerting

        annotations:
          summary: "High Error Rate"
          description: "More than 5 server-side (5xx) errors per second have been detected during the last 5 minutes."

        labels:
          severity: critical
          service: auth-service
          team: backend