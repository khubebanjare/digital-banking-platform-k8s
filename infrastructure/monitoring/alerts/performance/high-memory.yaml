apiVersion: 1

groups:
  - name: memory-alerts
    interval: 1m

    rules:
      - uid: high-memory
        title: High JVM Memory Usage
        condition: A
        for: 2m

        data:
          - refId: A
            datasourceUid: prometheus
            model:
              expr: >
                (
                  sum(jvm_memory_used_bytes{area="heap"})
                  /
                  sum(jvm_memory_max_bytes{area="heap"})
                ) * 100 > 80

        noDataState: NoData
        execErrState: Alerting

        annotations:
          summary: "High JVM Memory Usage"
          description: "JVM heap memory usage has exceeded 80% for more than 2 minutes."

        labels:
          severity: warning
          service: auth-service