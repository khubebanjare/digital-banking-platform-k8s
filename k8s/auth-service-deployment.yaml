  apiVersion: apps/v1
  kind: Deployment
  metadata:
    name: auth-service
    namespace: digital-payment

  spec:
    replicas: 1

    selector:
      matchLabels:
        app: auth-service

    template:
      metadata:
        labels:
          app: auth-service

      spec:
        containers:
          - name: auth-service
            image: khube/auth-service:1.0

            ports:
              - containerPort: 8080

            env:
              - name: SPRING_PROFILES_ACTIVE
                value: k8s

              - name: SPRING_CONFIG_IMPORT
                value: optional:configserver:http://config-server-service:9999
