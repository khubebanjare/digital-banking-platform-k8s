# SonarQube configuration for digital-banking-platform-k8s

# Project identification
sonar.projectKey=digital-banking-platform-k8s
sonar.projectName=digital-banking-platform-k8s
sonar.projectVersion=1.0

# Source code location
sonar.sources=.
sonar.sourceEncoding=UTF-8

# Exclusions
sonar.exclusions=**/build/**,**/target/**,**/dist/**,**/.gradle/**,**/.idea/**,**/node_modules/**
sonar.java.binaries=**/build/classes/java/main
sonar.java.test.binaries=**/build/classes/java/test

# Java specific settings
sonar.java.source=11
sonar.java.target=11

# Test coverage
sonar.coverage.jacoco.xmlReportPaths=**/build/reports/jacoco/test/jacocoTestReport.xml

# Multi-module project settings
sonar.moduleKey=${project.name}
